name: Deploy ASP.NET Web App to Azure App Service

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7
        with:
          fetch-depth: 1

      - name: Setup .NET
        uses: actions/setup-dotnet@v4.1.0
        with:
          dotnet-version: '8.0.x'

      - name: Find and build project
        shell: pwsh
        run: |
          # Find the project file
          $projectFiles = @(Get-ChildItem -Recurse -Filter "*.csproj" -ErrorAction SilentlyContinue | Where-Object { $_.FullName -notmatch "\\bin\\|\\obj\\" })
          
          if ($projectFiles.Count -eq 0) {
            Write-Host "::error::No .csproj files found in repository"
            exit 1
          }
          
          if ($projectFiles.Count -gt 1) {
            Write-Host "::warning::Multiple .csproj files found, using first one"
          }
          
          $projectFile = $projectFiles[0].FullName
          Write-Host "Building: $projectFile"
          
          # Restore
          & dotnet restore "$projectFile"
          if ($LASTEXITCODE -ne 0) { exit 1 }
          
          # Build
          & dotnet build "$projectFile" --configuration Release --no-restore --verbosity minimal
          if ($LASTEXITCODE -ne 0) { exit 1 }
          
          Write-Host "✓ Build successful"

      - name: Publish application
        id: prepare_package
        shell: pwsh
        run: |
          $projectFiles = @(Get-ChildItem -Recurse -Filter "*.csproj" -ErrorAction SilentlyContinue | Where-Object { $_.FullName -notmatch "\\bin\\|\\obj\\" })
          $projectFile = $projectFiles[0].FullName
          
          & dotnet publish "$projectFile" -c Release -o "publish" --verbosity minimal
          if ($LASTEXITCODE -ne 0) { exit 1 }
          
          $zipPath = "app.zip"
          Compress-Archive -Path "publish/*" -DestinationPath $zipPath -CompressionLevel Optimal -Force
          $sizeMB = [math]::Round((Get-Item $zipPath).Length / 1MB, 2)
          
          "deploy_package=$((Get-Item $zipPath).FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "✓ Published to: $(Get-Item $zipPath | Select-Object -ExpandProperty FullName) ($sizeMB MB)"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy zip package to App Service
        shell: pwsh
        run: |
          az webapp deploy `
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" `
            --name "${{ vars.AZURE_WEBAPP_NAME }}" `
            --src-path "${{ steps.prepare_package.outputs.deploy_package }}" `
            --type zip
