name: Deploy ASP.NET Web App to Azure App Service

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on:
      - self-hosted
      - windows
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare deployment package
        id: prepare_package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $staging = Join-Path $env:RUNNER_TEMP 'site-package'
          New-Item -ItemType Directory -Path $staging -Force | Out-Null

          $exclude = @(
            '.git',
            '.github',
            '.gitignore',
            'Readme.md',
            'THIRDPARTYNOTICE.rtf'
          )

          Get-ChildItem -Path . -Force | Where-Object { $exclude -notcontains $_.Name } | ForEach-Object {
            Copy-Item -Path $_.FullName -Destination $staging -Recurse -Force
          }

          $zipPath = Join-Path $env:RUNNER_TEMP 'site.zip'
          if (Test-Path $zipPath) {
            Remove-Item -Path $zipPath -Force
          }
          Compress-Archive -Path (Join-Path $staging '*') -DestinationPath $zipPath -CompressionLevel Optimal
          "deploy_package=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy zip package to App Service
        shell: pwsh
        run: |
          az webapp deploy `
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" `
            --name "${{ vars.AZURE_WEBAPP_NAME }}" `
            --src-path "${{ steps.prepare_package.outputs.deploy_package }}" `
            --type zip
