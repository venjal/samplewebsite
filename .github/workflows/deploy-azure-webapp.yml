name: Deploy ASP.NET Web App to Azure App Service

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7

      - name: Setup .NET
        uses: actions/setup-dotnet@v4.1.0
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build .NET 8 app
        run: dotnet build --configuration Release --no-restore

      - name: Publish application
        id: prepare_package
        shell: pwsh
        run: |
          dotnet publish -c Release -o "${{ runner.temp }}/publish"
          $zipPath = Join-Path "${{ runner.temp }}" 'app.zip'
          Compress-Archive -Path "${{ runner.temp }}/publish/*" -DestinationPath $zipPath -CompressionLevel Optimal
          "deploy_package=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy zip package to App Service
        shell: pwsh
        run: |
          az webapp deploy `
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" `
            --name "${{ vars.AZURE_WEBAPP_NAME }}" `
            --src-path "${{ steps.prepare_package.outputs.deploy_package }}" `
            --type zip
